name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Sets permissions for the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; cancel in-flight runs if a new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        run: npm run generate
        env:
          # Ensures Nuxt knows the public URL for sitemap / canonical URLs
          NUXT_PUBLIC_SITE_URL: https://devendrainfotech.github.io

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Nuxt's static output lives here
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
